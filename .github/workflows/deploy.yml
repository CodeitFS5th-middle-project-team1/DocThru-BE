name: Deploy to Render and Notify Discord

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: |
          # 배포 요청을 보내고 배포가 끝날 때까지 기다림
          RESPONSE=$(curl -s -w "%{http_code}" -o /dev/null -X POST ${{ secrets.RENDER_DEPLOY_HOOK }})
          if [ "$RESPONSE" != "200" ]; then
            echo "배포 실패! 응답 코드: $RESPONSE"
            exit 1
          fi
          echo "배포 요청 완료, 배포 진행 중..."

          # 배포 상태 확인을 위해 Render API를 활용 (서비스 ID, 배포 ID 필요)
          DEPLOY_STATUS=$(curl -s -X GET "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
                            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}")
          
          # 예시로, 배포가 완료된 상태 확인
          if echo "$DEPLOY_STATUS" | grep -q '"status":"succeeded"'; then
            echo "배포 완료됨"
          else
            echo "배포 실패 또는 아직 진행 중"
            exit 1
          fi

      - name: Notify Discord on success
        if: success()
        run: |
          curl -X POST \
               -H "Content-Type: application/json" \
               -d "{\"content\":\"✅ Render 배포 성공! (브랜치: develop)\n배포 완료 시간: $(date)\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -X POST \
               -H "Content-Type: application/json" \
               -d "{\"content\":\"❌ Render 배포 실패... (브랜치: develop)\n배포 실패 시간: $(date)\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}
